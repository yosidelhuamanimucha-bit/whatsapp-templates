<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plantillas WhatsApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script>
      const temaInicial =
        localStorage.getItem("whatsapp-templates-tema") ??
        (window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "oscuro"
          : "claro");
      if (temaInicial === "oscuro")
        document.documentElement.classList.add("dark");
    </script>
  </head>
  <body
    class="bg-slate-100 dark:bg-slate-900 min-h-screen p-6 transition-colors"
  >
    <div
      class="max-w-5xl mx-auto flex items-center justify-center gap-3 mb-6 relative"
    >
      <h1
        class="text-3xl font-bold text-center text-slate-800 dark:text-slate-100"
      >
        Mis Plantillas
      </h1>
      <button
        id="btn-tema"
        title="Cambiar tema"
        class="absolute right-0 text-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full w-10 h-10 flex items-center justify-center shadow hover:scale-105 transition"
      >
        🌙
      </button>
    </div>

    <div class="max-w-5xl mx-auto grid gap-6 md:grid-cols-[320px_1fr]">
      <div class="grid gap-6 self-start">
        <form
          id="form-plantilla"
          class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow grid gap-2"
        >
          <input
            id="titulo"
            type="text"
            placeholder="Título"
            class="p-2 border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-400"
          />
          <input
            id="hashtag"
            type="text"
            placeholder="hashtag"
            class="p-2 border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-400"
          />
          <textarea
            id="mensaje"
            rows="3"
            placeholder="Mensaje (usa {nombre} y {producto})"
            class="p-2 border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-400"
          ></textarea>
          <div class="flex gap-2">
            <button
              type="submit"
              id="btn-guardar"
              class="bg-emerald-600 text-white py-2 rounded flex-1 hover:bg-emerald-700 transition"
            >
              Agregar plantilla
            </button>
            <button
              type="button"
              id="btn-cancelar"
              class="hidden bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-2 px-3 rounded"
            >
              Cancelar
            </button>
          </div>
        </form>

        <section
          id="generador"
          class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow grid gap-3"
        >
          <h2 class="font-bold text-slate-800 dark:text-slate-100">
            ✨ Usar plantilla
          </h2>

          <label class="grid gap-1 text-xs text-slate-500 dark:text-slate-400">
            Plantilla
            <select
              id="selector"
              class="p-2 border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100"
            ></select>
          </label>

          <label class="grid gap-1 text-xs text-slate-500 dark:text-slate-400">
            Nombre real
            <input
              id="valorNombre"
              type="text"
              placeholder="ej. Ana"
              class="p-2 border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 placeholder-slate-400"
            />
          </label>

          <label class="grid gap-1 text-xs text-slate-500 dark:text-slate-400">
            Producto
            <input
              id="valorProducto"
              type="text"
              placeholder="ej. Zapatillas"
              class="p-2 border border-slate-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 placeholder-slate-400"
            />
          </label>

          <button
            id="btn-generar"
            class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 rounded transition"
          >
            Generar
          </button>

          <div
            class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded p-3 grid gap-2"
          >
            <p
              id="mensaje-final"
              class="text-sm text-slate-700 dark:text-slate-200 whitespace-pre-wrap min-h-[1.5rem]"
            ></p>
            <button
              id="btn-copiar"
              class="justify-self-end text-xs text-emerald-700 dark:text-emerald-400 hover:text-emerald-800 dark:hover:text-emerald-300"
            >
              📋 Copiar
            </button>
          </div>
        </section>
      </div>

      <div class="grid gap-4 content-start">
        <div class="flex gap-2">
          <input
            id="buscador"
            type="text"
            placeholder="Filtra por hashtag…"
            class="flex-1 p-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 placeholder-slate-400"
          />
          <button
            id="btn-limpiar-filtro"
            title="Limpiar filtro"
            class="px-3 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition"
          >
            ✕
          </button>
        </div>

        <select
          id="orden"
          class="w-full p-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100"
        >
          <option value="recientes">Más recientes</option>
          <option value="antiguas">Más antiguas</option>
          <option value="alfabetico">Alfabético (A-Z)</option>
        </select>

        <aside
          id="panel-stats"
          class="bg-slate-100 dark:bg-slate-800 rounded-lg p-3"
        ></aside>
        <ul id="listaPlantillas" class="grid gap-3 sm:grid-cols-2"></ul>

        <div
          class="flex items-center justify-between border-t border-slate-200 dark:border-slate-700 pt-3 mt-1"
        >
          <p
            id="estado"
            class="text-xs text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-full"
          >
            Listo
          </p>
          <div class="flex gap-2">
            <button
              id="btn-exportar"
              class="text-xs px-3 py-1.5 rounded-md border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition"
            >
              Exportar
            </button>
            <button
              id="btn-vaciar"
              class="text-xs px-3 py-1.5 rounded-md border border-red-200 dark:border-red-900 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950 transition"
            >
              Vaciar todo
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      id="modal"
      class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4"
    >
      <div
        class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-xl max-w-sm w-full text-center"
      >
        <p id="modal-texto" class="text-slate-700 dark:text-slate-200 mb-5">
          ¿Seguro?
        </p>
        <div class="flex gap-2 justify-center">
          <button
            id="modal-cancelar"
            class="px-4 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-600 transition"
          >
            Cancelar
          </button>
          <button
            id="modal-confirmar"
            class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 transition"
          >
            Eliminar
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
